      - name: intentcaptureid
        in: path
        required: true
        schema:
          type: string
      - name: intentdisputeid
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              Decision: DEFENDED
  '{envurl}/v3.0/{clientId}/payins/intents/{intentid}/splits':
