          type: string
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      - name: intentid
        in: path
        required: true
        schema:
          type: string
      - name: intentcaptureid
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
