      - name: clientId
        in: path
        required: true
        schema:
          type: string
      - name: intentid
        in: path
        required: true
        schema:
          type: string
      - name: intentrefundid
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  '{envurl}/v3.0/{clientId}/payins/intents/{intentid}/captures/{intentcaptureid}/disputes':
