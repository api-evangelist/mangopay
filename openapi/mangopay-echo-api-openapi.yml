        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              Splits:
              - LineItemId: '{{INTENT_LINE_ITEM_ID_1}}'
                SplitAmount: 10000
                FeesAmount: 100
                TransferDate: 1752439988
                Description: Custom description of the Split
              - LineItemId: '{{INTENT_LINE_ITEM_ID_2}}'
                SplitAmount: 10000
                FeesAmount: 100
                TransferDate: 1752439988
                Description: Custom description of the Split
