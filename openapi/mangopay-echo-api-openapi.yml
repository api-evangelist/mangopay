openapi: 3.0.3
info:
  title: Mangopay REST Bank Accounts Echo API
  description: The Mangopay REST API enables platforms to manage users, e-wallets, pay-ins, payouts, transfers, foreign exchange, KYC/KYB identity verification, fraud prevention, and dispute handling for multi-party payment flows.
  version: '2.01'
  contact:
    name: Mangopay Support
    url: https://hub.mangopay.com
servers:
- url: https://api.mangopay.com/v2.01/{clientId}
  description: Production
  variables:
    clientId:
      default: your-client-id
      description: Your Mangopay Client ID
- url: https://api.sandbox.mangopay.com/v2.01/{clientId}
  description: Sandbox
  variables:
    clientId:
      default: your-client-id
      description: Your Mangopay Client ID
security:
- OAuth2: []
tags:
- name: Echo
paths:
  '{envurl}/v3.0/{clientId}/payins/intents':
    post:
      tags:
      - Echo
      summary: Create an Intent (2 LineItems)
      operationId: post_envurl_v3_0_clientId_payins_intents
      parameters:
      - name: envurl
        in: path
        required: true
        schema:
          type: string
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  '{envurl}/v3.0/{clientId}/payins/intents/{intentid}':
    put:
      tags:
      - Echo
      summary: Update an Intent
      operationId: put_envurl_v3_0_clientId_payins_intents_intentid
      parameters:
      - name: envurl
        in: path
        required: true
        schema:
          type: string
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      - name: intentid
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              Amount: 22000
              LineItems:
              - Id: '{{INTENT_LINE_ITEM_ID_1}}'
                Sku: example-item-123
                Quantity: 2
                UnitAmount: 6000
                DiscountAmount: 0
    get:
      tags:
      - Echo
      summary: View an Intent
      operationId: get_envurl_v3_0_clientId_payins_intents_intentid
      parameters:
      - name: envurl
        in: path
        required: true
        schema:
          type: string
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      - name: intentid
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  '{envurl}/v3.0/{clientId}/payins/intents/{intentid}/cancel':
    post:
      tags:
      - Echo
      summary: Cancel an Intent (full)
      operationId: post_envurl_v3_0_clientId_payins_intents_intentid_cancel
      parameters:
      - name: envurl
        in: path
        required: true
        schema:
          type: string
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      - name: intentid
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  '{envurl}/v3.0/{clientId}/payins/intents/{intentid}/captures':
