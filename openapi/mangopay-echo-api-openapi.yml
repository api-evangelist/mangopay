      - name: clientId
        in: path
        required: true
        schema:
          type: string
      - name: intentid
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  '{envurl}/v3.0/{clientId}/payins/intents/{intentid}/refunds':
    post:
      tags:
      - Echo
      summary: Create a Refund of an Intent (full)
      operationId: post_envurl_v3_0_clientId_payins_intents_intentid_refunds
      parameters:
      - name: envurl
        in: path
        required: true
        schema:
          type: string
      - name: clientId
        in: path
        required: true
        schema:
          type: string
      - name: intentid
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  '{envurl}/v3.0/{clientId}/payins/intents/{intentid}/refunds/{intentrefundid}/reverse':
